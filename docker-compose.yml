version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-authdb}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-postgres} -d ${DB_NAME:-authdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-net

  backend:
    build:
      context: src/main/java
      dockerfile: Dockerfile
    container_name: auth-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-authdb}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      # JWT — maps to application.jwt.* in application.yml
      APPLICATION_JWT_SECRET: ${APPLICATION_JWT_SECRET}
      APPLICATION_JWT_ACCESS_TOKEN_EXPIRY: ${APPLICATION_JWT_ACCESS_TOKEN_EXPIRY:-900000}
      APPLICATION_JWT_REFRESH_TOKEN_EXPIRY: ${APPLICATION_JWT_REFRESH_TOKEN_EXPIRY:-604800000}

      # Rate limiting overrides (optional)
      APPLICATION_RATE_LIMIT_CAPACITY: ${APPLICATION_RATE_LIMIT_CAPACITY:-20}
      APPLICATION_RATE_LIMIT_REFILL_TOKENS: ${APPLICATION_RATE_LIMIT_REFILL_TOKENS:-20}
      APPLICATION_RATE_LIMIT_REFILL_DURATION_SECONDS: ${APPLICATION_RATE_LIMIT_REFILL_DURATION_SECONDS:-60}

      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}

    networks:
      - backend-net

volumes:
  postgres_data:

networks:
  backend-net:
    driver: bridge
